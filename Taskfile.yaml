version: '3'

vars:
  BINARY: tfplan-summary-go

tasks:
  fmt:
    desc: Format all Go source files
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run staticcheck
    cmds:
      - staticcheck ./...

  vuln:
    desc: Run govulncheck
    cmds:
      - govulncheck ./...

  test:
    desc: Run all tests
    cmds:
      - go test ./...
  
  test-coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -v ./... -count=1 -coverprofile=coverage.out -covermode=atomic
      - go tool cover -func=coverage.out

  build:
    desc: Run all checks and build binary to bin/
    cmds:
      - task: check
      - mkdir -p bin
      - go build -o bin/{{.BINARY}} .

  check:
    desc: Run all checks (fmt, vet, lint, vuln, test)
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: vuln
      - task: test